# 企业管理系统 Nginx HTTPS 配置
# 域名: dell.codekfc.top
# HTTPS 端口: 16321
# HTTP 重定向到 HTTPS

# HTTP 重定向到 HTTPS
server {
    listen 80;
    server_name dell.codekfc.top;
    
    # 重定向所有 HTTP 请求到 HTTPS
    return 301 https://$server_name:16321$request_uri;
}

# HTTPS 主服务器配置
server {
    listen 16321 ssl http2;
    server_name dell.codekfc.top;
    
    # SSL 证书配置
    ssl_certificate /mnt/d/ideaProject/testMaven/nginx/cert/dell.codekfc.top.pem;
    ssl_certificate_key /mnt/d/ideaProject/testMaven/nginx/cert/dell.codekfc.top.key;
    
    # SSL 协议配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;
    
    # SSL 会话缓存
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;
    
    # 安全头部
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # 项目构建目录
    root /mnt/d/openclaw/autoCode/my-vue-app/dist;
    index index.html;
    
    # 启用访问日志
    access_log /var/log/nginx/enterprise-management-https.access.log;
    error_log /var/log/nginx/enterprise-management-https.error.log;
    
    # SPA 应用的路由支持
    location / {
        try_files $uri $uri/ /index.html;
        
        # 缓存控制
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }
    
    # 静态资源缓存 - 长期缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
    }
    
    # API 代理示例（如果需要）
    # location /api/ {
    #     proxy_pass http://api-server:3000/;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }
    
    # 启用 gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        image/svg+xml;
    
    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    
    # 错误页面
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}

# 企业管理系统 HTTPS 配置
# 仅支持 HTTPS 访问，HTTP 访问被拒绝

# HTTPS 服务器配置
server {
    listen 16321 ssl;
    server_name dell.codekfc.top;
    
    # SSL 证书配置
    ssl_certificate /mnt/d/ideaProject/testMaven/nginx/cert/dell.codekfc.top.pem;
    ssl_certificate_key /mnt/d/ideaProject/testMaven/nginx/cert/dell.codekfc.top.key;
    
    # SSL/TLS 协议配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512;
    ssl_prefer_server_ciphers on;
    
    # 安全头部
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    
    # 项目根目录
    root /mnt/d/openclaw/autoCode/my-vue-app/dist;
    index index.html;
    
    # SPA 路由处理
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    # Gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
}

# 重要：此配置必须与以下拒绝 HTTP 访问的配置一起使用
# 在 /etc/nginx/sites-available/enterprise-https-only 中完整配置包含：
# 1. 上面的 HTTPS server 块
# 2. 下面的 HTTP 拒绝 server 块

